name: Tasca
description: Una unitat concreta de treball tècnic
title: "[TASK] "
labels:
  - "type/task"
body:
  - type: markdown
    attributes:
      value: |
        Les tasques han de ser petites i concretes. Si una tasca és més gran que un dia de feina, divideix-la.

  - type: input
    id: task-id
    attributes:
      label: ID de la tasca
      description: L'identificador, p. ex. `E4-US1-T1`.
      placeholder: p. ex. E4-US1-T1
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Descripció
      description: Què s'ha de fer exactament, com fer-ho, fitxers a modificar, indicacions tècniques.
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Criteris d'acceptació (Donat / Quan / Aleshores)
      description: Criteris verificables utilitzant el patró Donat/Quan/Aleshores.
      value: |
        - [ ] Donat ..., quan ..., aleshores ...
        - [ ] Donat ..., quan ..., aleshores ...
    validations:
      required: true

  - type: textarea
    id: dependencies
    attributes:
      label: Dependències
      description: Tasques, _issues_ o decisions de les quals depèn aquesta tasca.
      value: |
        -
