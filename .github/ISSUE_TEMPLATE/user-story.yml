name: Història d'usuari
description: Una unitat de valor lliurable a un usuari
title: "[US] "
labels:
  - "type/user-story"
body:
  - type: markdown
    attributes:
      value: |
        Les històries d'usuari descriuen una funcionalitat des de la perspectiva de l'usuari. Omple el patró "Com a / Vull / Per tal que" i els criteris d'acceptació a continuació.

  - type: input
    id: story-id
    attributes:
      label: ID de la història
      description: L'identificador, p. ex. `E4-US1`.
      placeholder: p. ex. E4-US1
    validations:
      required: true

  - type: textarea
    id: user-story
    attributes:
      label: Història
      description: Descriu la funcionalitat seguint el patró "Com a / Vull / Per tal que".
      value: |
        **Com a**
        **Vull**
        **Per tal que**
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Criteris d'acceptació (Donat / Quan / Aleshores)
      description: Criteris verificables utilitzant el patró Donat/Quan/Aleshores.
      value: |
        - [ ] Donat ..., quan ..., aleshores ...
        - [ ] Donat ..., quan ..., aleshores ...
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Notes / context
      description: Dissenys, mètodes de contracte rellevants, dependències, enllaços.
