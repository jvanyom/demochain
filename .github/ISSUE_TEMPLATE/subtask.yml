name: Subtasca
description: Una unitat petita de treball dins d'una tasca
title: "[SUBTASK] "
labels:
  - "type/subtask"
body:
  - type: markdown
    attributes:
      value: |
        Utilitza una subtasca només quan una tasca sigui realment gran. Mantén la jerarquia simple: tres nivells (Èpica → Història → Tasca) solen ser suficients.

  - type: input
    id: subtask-id
    attributes:
      label: ID de la subtasca
      description: L'identificador, p. ex. `E4-US1-T1-S1`.
      placeholder: p. ex. E4-US1-T1-S1
    validations:
      required: true

  - type: textarea
    id: what
    attributes:
      label: Què
    validations:
      required: true

  - type: textarea
    id: definition-of-done
    attributes:
      label: Definició de fet
      value: |
        - [ ] Fet
    validations:
      required: true

  - type: input
    id: parent-task
    attributes:
      label: Tasca pare
      description: L'identificador de la tasca pare (p. ex. `E4-US1-T1`). Enllaça-la també com a sub-incidència.
      placeholder: p. ex. E4-US1-T1
    validations:
      required: true
