name: PR checks

on:
  pull_request:
    types: [ opened, edited, synchronize, reopened ]

jobs:
  pr-title:
    name: Conventional Commits title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            test
            chore
            ci
            build
            perf
            revert
          requireScope: false

  lint-algorand:
    name: Ruff lint (Algorand)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv run ruff check voting-contract/
        working-directory: voting-contract
      - run: uv run ruff format --check voting-contract/
        working-directory: voting-contract

  lint-client:
    name: oxlint + oxfmt (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
        working-directory: client
      - run: bun run check
        working-directory: client

  test-client:
    name: Tests client (Bun)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Start algod + KMD
        run: docker compose up algod --wait --timeout 60
      - uses: oven-sh/setup-bun@v2
      - run: bun install
        working-directory: client
      - run: bun test
        working-directory: client

  test-algorand:
    name: Tests Algorand (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --group dev
        working-directory: voting-contract
      - run: uv run pytest tests
        working-directory: voting-contract

  test-ethereum:
    name: Tests Ethereum (Hardhat)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: network/ethereum/package-lock.json
      - run: npm ci
        working-directory: network/ethereum
      - run: npm test
        working-directory: network/ethereum
