# Demochain - entorn de desenvolupament
#
# Configuració centralitzada a .env (vegeu .env.example per als valors per defecte):
#   cp .env.example .env
#
# Aixeca client + LocalNet de Algorand:
#
# - Client Vite: http://localhost:${CLIENT_PORT}
# - Algod:       http://localhost:${ALGOD_PORT}
# - KMD:         http://localhost:${KMD_PORT}
# - Indexer:     http://localhost:${INDEXER_PORT}
#
# ⚠️  No combinar amb 'algokit localnet start': empren els mateixos ports.
#    S'ha d'aturar primer amb 'algokit localnet stop'.
#
# El servei 'contract-deploy' compila el contracte de 'voting-contract/'
# via uv + puyapy, el desplega contra algod i escriu el APP_ID resultant
# a 'client/.env.local' (variable VITE_APP_ID). El client el llegeix en arrancar;
# amb 'down -v' es reinicia la chain i el següent 'up' i reescriu el fitxer
# amb el nou ID.
#
# Arquitectura indexer:
#   algod conté DOS nodes interns (lead:8080 + follower:8081).
#   conduit-localnet llegeix deltes d'estat del follower via 'localnet_algod'.
#   indexer serveix l'API de cerca sobre postgres.
#
# Arquitectura Ethereum / ancoratge:
#   hardhat exposa un node JSON-RPC local (port ${ETH_RPC_PORT}).
#   ethereum-deploy compila i desplega NotaryContract, registra les 3
#   universitats com a submitters i escriu NOTARY_CONTRACT_ADDRESS al
#   volum compartit 'shared-state'.
#   anchoring és un contenidor en repòs amb deps web3+algosdk; valida
#   connectivitat a l'inici i resta disponible per a 'docker compose exec'.
#
# Heartbeat del LocalNet (només per a la branca dev):
#   chain-heartbeat submiteix una PaymentTxn no-op cada
#   HEARTBEAT_INTERVAL_SEC segons (per defecte 3) per forçar la generació
#   de blocs i mantenir Global.latest_timestamp dins de N segons del
#   wall-clock. Necessari perquè algod corre amb DevMode=true i, sense
#   transaccions, el rellotge del consens es congela.
#   A main, en canvi, s'usarà DevMode=false (consens real ~3.3s/bloc).

services:
  algod:
    image: algorand/algod:latest
    ports:
      - "${ALGOD_PORT}:${ALGOD_CONTAINER_PORT}"
      - "${KMD_PORT}:${KMD_CONTAINER_PORT}"
    environment:
      TOKEN: "${ALGO_TOKEN}"
      KMD_TOKEN: "${ALGO_TOKEN}"
      ADMIN_TOKEN: "${ALGO_TOKEN}"
      START_KMD: 1
      GOSSIP_PORT: 10000
      KMD_WALLET_NAME: "${KMD_WALLET_NAME}"
      KMD_WALLET_PASSWORD: "${KMD_WALLET_PASSWORD}"
    volumes:
      - algod-data:/algod/data
      - ./algod-config.json:/etc/algorand/config.json:ro
      - ./algod-network-template.json:/etc/algorand/template.json:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:${ALGOD_CONTAINER_PORT}/health && curl -sf http://localhost:${KMD_CONTAINER_PORT}/v1/wallets -H 'X-KMD-API-Token: ${ALGO_TOKEN}' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s

  contract-deploy:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    working_dir: /workspace
    volumes:
      - ./voting-contract:/workspace
      - ./client:/client-out
      - shared-state:/shared
      - uv-cache:/root/.cache/uv
      - contract-venv:/venv
    environment:
      UV_PROJECT_ENVIRONMENT: "/venv"
      ALGOD_SERVER: "http://${ALGOD_HOST}"
      ALGOD_PORT: "${ALGOD_CONTAINER_PORT}"
      ALGOD_TOKEN: "${ALGO_TOKEN}"
      INDEXER_SERVER: ""
      INDEXER_PORT: ""
      INDEXER_TOKEN: ""
      KMD_SERVER: "http://${ALGOD_HOST}"
      KMD_PORT: "${KMD_CONTAINER_PORT}"
      KMD_TOKEN: "${ALGO_TOKEN}"
    command:
      - bash
      - -c
      - |
        set -euo pipefail
        echo "[contract-deploy] uv sync"
        uv sync --frozen 2>/dev/null || uv sync
        echo "[contract-deploy] building contract"
        uv run python -m smart_contracts build
        echo "[contract-deploy] deploying contract"
        uv run python -m smart_contracts deploy 2>&1 | tee /tmp/deploy.log
        APP_ID=$$(sed -n 's/.*app_id=\([0-9]\+\).*/\1/p' /tmp/deploy.log | tail -n1)
        if [ -z "$$APP_ID" ]; then
          echo "[contract-deploy] could not extract APP_ID from deploy log" >&2
          exit 1
        fi
        echo "[contract-deploy] APP_ID=$$APP_ID - writing /client-out/.env.local"
        echo "VITE_APP_ID=$$APP_ID" > /client-out/.env.local
        echo "[contract-deploy] writing /shared/algorand.env"
        echo "DEMOCHAIN_APP_ID=$$APP_ID" > /shared/algorand.env
    depends_on:
      algod:
        condition: service_healthy
    restart: "no"

  hardhat:
    image: node:20-bookworm-slim
    working_dir: /workspace
    command:
      - sh
      - -c
      - |
        set -eu
        if [ ! -d node_modules ] || [ ! -x node_modules/.bin/hardhat ]; then
          echo "[hardhat] npm install"
          npm install --no-audit --no-fund
        fi
        echo "[hardhat] starting node on 0.0.0.0:8545"
        exec npx --no-install hardhat node --hostname 0.0.0.0 --port 8545
    volumes:
      - ./network/ethereum:/workspace
      - hardhat-node-modules:/workspace/node_modules
    ports:
      - "${ETH_RPC_PORT}:8545"
    healthcheck:
      test: ["CMD", "node", "/workspace/healthcheck.js"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  ethereum-deploy:
    image: node:20-bookworm-slim
    working_dir: /workspace
    volumes:
      - ./network/ethereum:/workspace
      - shared-state:/shared
      - hardhat-node-modules:/workspace/node_modules
    environment:
      ETHEREUM_LOCALHOST_URL: "http://hardhat:8545"
      UIB_ETH_PRIVATE_KEY: "${UIB_ETH_PRIVATE_KEY}"
      UPC_ETH_PRIVATE_KEY: "${UPC_ETH_PRIVATE_KEY}"
      UAB_ETH_PRIVATE_KEY: "${UAB_ETH_PRIVATE_KEY}"
      SHARED_DIR: /shared
    depends_on:
      hardhat:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        set -eu
        echo "[ethereum-deploy] hardhat compile"
        npx --no-install hardhat compile
        echo "[ethereum-deploy] deploying NotaryContract + registering universities"
        npx --no-install hardhat run scripts/deploy_localnet.js --network localhost
    restart: "no"

  anchoring:
    image: python:3.12-slim
    working_dir: /workspace
    volumes:
      - ./network:/workspace/network
      - shared-state:/shared
      - anchoring-pip-cache:/root/.cache/pip
    environment:
      ALGOD_SERVER: "http://${ALGOD_HOST}"
      ALGOD_PORT: "${ALGOD_CONTAINER_PORT}"
      ALGOD_TOKEN: "${ALGO_TOKEN}"
      INDEXER_SERVER: "http://indexer"
      INDEXER_PORT: "8980"
      ETHEREUM_RPC_URL: "http://hardhat:8545"
      ETH_GAS_LIMIT: "${ETH_GAS_LIMIT}"
      ETH_TX_TIMEOUT: "${ETH_TX_TIMEOUT}"
      UIB_ETH_PRIVATE_KEY: "${UIB_ETH_PRIVATE_KEY}"
      UPC_ETH_PRIVATE_KEY: "${UPC_ETH_PRIVATE_KEY}"
      UAB_ETH_PRIVATE_KEY: "${UAB_ETH_PRIVATE_KEY}"
      PYTHONPATH: /workspace
    depends_on:
      algod:
        condition: service_healthy
      hardhat:
        condition: service_healthy
      contract-deploy:
        condition: service_completed_successfully
      ethereum-deploy:
        condition: service_completed_successfully
    command:
      - bash
      - -c
      - |
        set -eu
        echo "[anchoring] installing deps"
        pip install --quiet --no-input \
          'py-algorand-sdk>=2.7,<3' \
          'web3>=7.0,<8' \
          'eth-account>=0.13' \
          'python-dotenv>=1.0,<2'
        if [ -f /shared/algorand.env ]; then
          export $$(cat /shared/algorand.env | xargs)
        fi
        if [ -f /shared/ethereum.env ]; then
          export $$(cat /shared/ethereum.env | xargs)
        fi
        echo "[anchoring] running smoke test"
        python /workspace/network/anchoring/smoke.py
        echo "[anchoring] ready — 'docker compose exec anchoring ...' to run anchoring ops"
        exec tail -f /dev/null
    restart: "no"

  indexer-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: algorand
      POSTGRES_PASSWORD: algorand
      POSTGRES_DB: indexer_db
    volumes:
      - indexer-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U algorand -d indexer_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  conduit:
    image: algorandfoundation/conduit-localnet:latest
    volumes:
      - conduit-data:/data
      - ./conduit.yml:/etc/algorand/conduit.yml:ro
    depends_on:
      algod:
        condition: service_healthy
      indexer-db:
        condition: service_healthy
    restart: unless-stopped

  indexer:
    image: algorand/indexer:latest
    ports:
      - "${INDEXER_PORT}:8980"
    command:
      - daemon
      - -P
      - "host=indexer-db port=5432 dbname=indexer_db user=algorand password=algorand sslmode=disable"
    depends_on:
      indexer-db:
        condition: service_healthy
      conduit:
        condition: service_started
    restart: unless-stopped

  chain-heartbeat:
    image: python:3.12-slim
    working_dir: /workspace
    volumes:
      - ./network/heartbeat:/workspace
      - heartbeat-pip-cache:/root/.cache/pip
    environment:
      ALGOD_URL: "http://${ALGOD_HOST}:${ALGOD_CONTAINER_PORT}"
      ALGO_TOKEN: "${ALGO_TOKEN}"
      KMD_URL: "http://${ALGOD_HOST}:${KMD_CONTAINER_PORT}"
      KMD_TOKEN: "${ALGO_TOKEN}"
      KMD_WALLET_NAME: "${KMD_WALLET_NAME}"
      KMD_WALLET_PASSWORD: "${KMD_WALLET_PASSWORD}"
      HEARTBEAT_INTERVAL_SEC: "${HEARTBEAT_INTERVAL_SEC}"
    command:
      - bash
      - -c
      - |
        set -eu
        echo "[chain-heartbeat] installing deps"
        pip install --quiet --no-input 'py-algorand-sdk>=2.7,<3'
        echo "[chain-heartbeat] starting"
        exec python /workspace/heartbeat.py
    depends_on:
      algod:
        condition: service_healthy
    restart: unless-stopped

  client:
    image: oven/bun:1.3
    working_dir: /app
    command: sh -c "bun install && bun run dev"
    volumes:
      - ./client:/app
      - client-node-modules:/app/node_modules
    ports:
      - "${CLIENT_PORT}:${CLIENT_CONTAINER_PORT}"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_ALGOD_SERVER: "${VITE_ALGOD_SERVER}"
      VITE_ALGOD_PORT: "${ALGOD_PORT}"
      VITE_ALGOD_TOKEN: "${ALGO_TOKEN}"
      VITE_KMD_SERVER: "${VITE_KMD_SERVER}"
      VITE_KMD_PORT: "${KMD_PORT}"
      VITE_KMD_TOKEN: "${ALGO_TOKEN}"
      VITE_KMD_WALLET_NAME: "${KMD_WALLET_NAME}"
      VITE_KMD_WALLET_PASSWORD: "${KMD_WALLET_PASSWORD}"
      VITE_LORA_BASE: "${VITE_LORA_BASE}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      algod:
        condition: service_started
      contract-deploy:
        condition: service_completed_successfully

volumes:
  algod-data:
  indexer-db-data:
  conduit-data:
  client-node-modules:
  uv-cache:
  hardhat-node-modules:
  anchoring-pip-cache:
  shared-state:
  heartbeat-pip-cache:
  contract-venv:
